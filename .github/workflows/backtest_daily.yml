# -*- coding: utf-8 -*-
"""
Nikkei225 Signal Backtest Tool
signal_history.jsonl を読み込み、過去のシグナル的中率を計算する。
"""

import os
import json
from datetime import datetime, timedelta, timezone

BASE_DIR = os.path.dirname(os.path.abspath(__file__))
HISTORY_PATH = os.path.join(BASE_DIR, "docs", "signal_history.jsonl")
OUTPUT_PATH = os.path.join(BASE_DIR, "docs", "backtest.json")

HORIZONS_MINUTES = [30, 60, 120]  # 30分後・1時間後・2時間後を検証


def load_history():
    if not os.path.exists(HISTORY_PATH):
        return []
    records = []
    with open(HISTORY_PATH, "r", encoding="utf-8") as f:
        for line in f:
            line = line.strip()
            if not line:
                continue
            try:
                r = json.loads(line)
                r["time_dt"] = datetime.strptime(r["time"], "%Y-%m-%d %H:%M")
                records.append(r)
            except (json.JSONDecodeError, ValueError):
                continue
    records.sort(key=lambda r: r["time_dt"])
    return records


def find_price_at_or_after(records, target_time, start_index):
    """target_time以降で最初に見つかる記録の終値を返す（start_indexから探索）"""
    for i in range(start_index, len(records)):
        if records[i]["time_dt"] >= target_time:
            return records[i]["close"], records[i]["time_dt"]
    return None, None


def run_backtest(records):
    signal_indices = [i for i, r in enumerate(records) if r["signal"] in ("買い", "売り")]

    results = {}
    for minutes in HORIZONS_MINUTES:
        horizon_key = f"{minutes}min"
        stats = {
            "買い": {"win": 0, "lose": 0, "flat": 0, "total_change": 0.0},
            "売り": {"win": 0, "lose": 0, "flat": 0, "total_change": 0.0},
        }

        for idx in signal_indices:
            entry = records[idx]
            target_time = entry["time_dt"] + timedelta(minutes=minutes)
            future_close, _ = find_price_at_or_after(records, target_time, idx + 1)
            if future_close is None:
                continue  # まだ未来のデータがない

            change = future_close - entry["close"]
            signal = entry["signal"]
            bucket = stats[signal]
            bucket["total_change"] += change if signal == "買い" else -change

            if signal == "買い":
                if change > 0:
                    bucket["win"] += 1
                elif change < 0:
                    bucket["lose"] += 1
                else:
                    bucket["flat"] += 1
            else:  # 売り
                if change < 0:
                    bucket["win"] += 1
                elif change > 0:
                    bucket["lose"] += 1
                else:
                    bucket["flat"] += 1

        horizon_result = {}
        for signal, bucket in stats.items():
            n = bucket["win"] + bucket["lose"] + bucket["flat"]
            win_rate = round(bucket["win"] / n * 100, 1) if n > 0 else None
            avg_change = round(bucket["total_change"] / n, 2) if n > 0 else None
            horizon_result[signal] = {
                "n": n,
                "win": bucket["win"],
                "lose": bucket["lose"],
                "flat": bucket["flat"],
                "win_rate": win_rate,
                "avg_change_points": avg_change,
            }
        results[horizon_key] = horizon_result

    return results, len(signal_indices)


def main():
    records = load_history()
    if len(records) < 2:
        print("Not enough history yet.")
        output = {
            "generated_at": datetime.now(timezone.utc).isoformat(),
            "total_history_points": len(records),
            "total_signals": 0,
            "horizons": {},
            "note": "履歴データがまだ少ないため、統計が安定するまで数日ほどお待ちください。",
        }
    else:
        results, total_signals = run_backtest(records)
        output = {
            "generated_at": datetime.now(timezone.utc).isoformat(),
            "total_history_points": len(records),
            "total_signals": total_signals,
            "horizons": results,
        }

    os.makedirs(os.path.dirname(OUTPUT_PATH), exist_ok=True)
    with open(OUTPUT_PATH, "w", encoding="utf-8") as f:
        json.dump(output, f, ensure_ascii=False, indent=2)

    print(f"backtest written: {OUTPUT_PATH}")
    print(json.dumps(output, ensure_ascii=False, indent=2))


if __name__ == "__main__":
    main()
