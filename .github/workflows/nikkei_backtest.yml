name: Nikkei225 Backtest
on:
  schedule:
    # 毎日 1:00 UTC (日本時間10:00) に1回実行
    - cron: "0 1 * * *"
  workflow_dispatch: {}  # 手動実行用ボタン
permissions:
  contents: write
jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install yfinance pandas numpy
      - name: Run backtest
        run: python backtest.py
      - name: Run forward test
        run: python forward_test.py
      - name: Run daily single-entry backtest
        run: python backtest_daily_single_entry.py
      - name: Run 1h long-term backtest
        run: python backtest_1h.py
      - name: Commit updated backtest result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/backtest.json docs/forward_test.json docs/backtest_daily_single_entry.json docs/backtest_1h.json
          git diff --staged --quiet || git commit -m "update backtest result"
          git push
