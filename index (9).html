<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日経225 デイトレシグナル</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --panel: #151b23;
    --border: #232b35;
    --text: #e6edf3;
    --muted: #7d8590;
    --buy: #2ea043;
    --sell: #da3633;
    --hold: #6e7681;
    --accent: #4f8ef7;
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    padding: 24px;
  }
  .wrap { max-width: 1000px; margin: 0 auto; }

  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 8px;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0;
    letter-spacing: 0.02em;
  }
  .updated {
    color: var(--muted);
    font-size: 12px;
    font-family: var(--mono);
  }

  .signal-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .signal-badge {
    font-size: 28px;
    font-weight: 700;
    padding: 10px 24px;
    border-radius: 8px;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .signal-badge.buy { background: rgba(46,160,67,0.15); color: var(--buy); border: 1px solid var(--buy); }
  .signal-badge.sell { background: rgba(218,54,51,0.15); color: var(--sell); border: 1px solid var(--sell); }
  .signal-badge.hold { background: rgba(110,118,129,0.15); color: var(--hold); border: 1px solid var(--hold); }

  .signal-meta { flex: 1; min-width: 200px; }
  .price { font-size: 26px; font-weight: 600; font-family: var(--mono); }
  .price-time { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .score { color: var(--muted); font-size: 13px; margin-top: 4px; font-family: var(--mono); }

  .reasons {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 16px;
  }
  .reasons h2 { font-size: 13px; color: var(--muted); margin: 0 0 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .reasons ul { margin: 0; padding-left: 18px; }
  .reasons li { margin-bottom: 6px; font-size: 14px; line-height: 1.5; }

  .chart-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px 20px;
    margin-bottom: 16px;
  }
  .chart-card h2 { font-size: 13px; color: var(--muted); margin: 0 0 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  canvas { max-height: 260px; }

  .disclaimer {
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    margin-top: 24px;
    line-height: 1.6;
  }

  .loading, .error {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
  }
  .error { color: var(--sell); }

  @media (max-width: 640px) {
    .chart-grid { grid-template-columns: 1fr; }
    .price { font-size: 22px; }
    .signal-badge { font-size: 22px; padding: 8px 18px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>日経225 デイトレシグナル</h1>
    <div class="updated" id="updated">読み込み中...</div>
  </header>

  <div id="content">
    <div class="loading">データを読み込んでいます...</div>
  </div>

  <div class="disclaimer">
    テクニカル指標による参考情報です。実際の売買は自己責任で判断してください。<br>
    本ツールは投資助言ではありません。マイクロ日経225先物そのものではなく日経平均株価指数のデータで代用しています。
  </div>
</div>

<script>
async function loadDashboard() {
  const content = document.getElementById('content');
  const updatedEl = document.getElementById('updated');

  try {
    const res = await fetch('data.json?t=' + Date.now());
    if (!res.ok) throw new Error('データファイルが見つかりません');
    const data = await res.json();

    const signalClass = data.signal === '買い' ? 'buy' : data.signal === '売り' ? 'sell' : 'hold';
    updatedEl.innerHTML = '更新: ' + new Date(data.updated_at).toLocaleString('ja-JP') + ' <span id="countdown"></span>';

    content.innerHTML = `
      <div class="signal-card">
        <div class="signal-badge ${signalClass}">${data.signal}</div>
        <div class="signal-meta">
          <div class="price">¥${data.latest_close.toLocaleString()}</div>
          <div class="price-time">${data.latest_time} 時点</div>
          <div class="score">スコア: ${data.score > 0 ? '+' : ''}${data.score}</div>
        </div>
      </div>

      <div class="reasons">
        <h2>判定根拠</h2>
        <ul>${data.reasons.map(r => `<li>${r}</li>`).join('')}</ul>
      </div>

      <div class="chart-card">
        <h2>価格 / 移動平均線</h2>
        <canvas id="priceChart"></canvas>
      </div>

      <div class="chart-grid">
        <div class="chart-card">
          <h2>RSI</h2>
          <canvas id="rsiChart"></canvas>
        </div>
        <div class="chart-card">
          <h2>MACD</h2>
          <canvas id="macdChart"></canvas>
        </div>
      </div>
    `;

    const labels = data.candles.map(c => c.time.slice(5));
    const closes = data.candles.map(c => c.close);
    const ma5 = data.candles.map(c => c.ma5);
    const ma25 = data.candles.map(c => c.ma25);
    const bbUpper = data.candles.map(c => c.bb_upper);
    const bbLower = data.candles.map(c => c.bb_lower);
    const rsi = data.candles.map(c => c.rsi);
    const macd = data.candles.map(c => c.macd);
    const macdSignal = data.candles.map(c => c.macd_signal);
    const macdHist = data.candles.map(c => c.macd_hist);

    const gridColor = '#232b35';
    const textColor = '#7d8590';
    const commonScales = {
      x: { ticks: { color: textColor, maxTicksLimit: 8, font: { size: 10 } }, grid: { color: gridColor } },
      y: { ticks: { color: textColor, font: { size: 10 } }, grid: { color: gridColor } }
    };

    // 既存のチャートインスタンスが残っていれば破棄してから作り直す
    if (window._charts) {
      window._charts.forEach(c => c.destroy());
    }
    window._charts = [];

    window._charts.push(new Chart(document.getElementById('priceChart'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: '終値', data: closes, borderColor: '#e6edf3', borderWidth: 1.5, pointRadius: 0, tension: 0.1 },
          { label: 'MA5', data: ma5, borderColor: '#4f8ef7', borderWidth: 1, pointRadius: 0, tension: 0.1 },
          { label: 'MA25', data: ma25, borderColor: '#f0883e', borderWidth: 1, pointRadius: 0, tension: 0.1 },
          { label: 'BB+2σ', data: bbUpper, borderColor: 'rgba(125,133,144,0.4)', borderWidth: 1, pointRadius: 0, borderDash: [4,4], tension: 0.1 },
          { label: 'BB-2σ', data: bbLower, borderColor: 'rgba(125,133,144,0.4)', borderWidth: 1, pointRadius: 0, borderDash: [4,4], tension: 0.1 },
        ]
      },
      options: {
        responsive: true,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { labels: { color: textColor, font: { size: 11 } } } },
        scales: commonScales
      }
    }));

    window._charts.push(new Chart(document.getElementById('rsiChart'), {
      type: 'line',
      data: {
        labels,
        datasets: [{ label: 'RSI', data: rsi, borderColor: '#a371f7', borderWidth: 1.5, pointRadius: 0, tension: 0.1 }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: commonScales.x,
          y: { min: 0, max: 100, ticks: { color: textColor, font: { size: 10 } }, grid: { color: gridColor } }
        }
      }
    }));

    window._charts.push(new Chart(document.getElementById('macdChart'), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { type: 'bar', label: 'ヒストグラム', data: macdHist, backgroundColor: macdHist.map(v => v >= 0 ? 'rgba(46,160,67,0.6)' : 'rgba(218,54,51,0.6)') },
          { type: 'line', label: 'MACD', data: macd, borderColor: '#4f8ef7', borderWidth: 1.5, pointRadius: 0, tension: 0.1 },
          { type: 'line', label: 'Signal', data: macdSignal, borderColor: '#f0883e', borderWidth: 1.5, pointRadius: 0, tension: 0.1 },
        ]
      },
      options: {
        responsive: true,
        plugins: { legend: { labels: { color: textColor, font: { size: 11 } } } },
        scales: commonScales
      }
    }));

  } catch (err) {
    content.innerHTML = `<div class="error">データの読み込みに失敗しました: ${err.message}<br>まだGitHub Actionsが一度も実行されていない場合は、手動実行してから再読み込みしてください。</div>`;
    updatedEl.textContent = '';
  }
}

loadDashboard();

// 60秒おきにバックグラウンドでデータを再取得し、自動更新する
const AUTO_REFRESH_SECONDS = 60;
let secondsLeft = AUTO_REFRESH_SECONDS;

setInterval(() => {
  secondsLeft -= 1;
  if (secondsLeft <= 0) {
    loadDashboard();
    secondsLeft = AUTO_REFRESH_SECONDS;
  }
  const countdownEl = document.getElementById('countdown');
  if (countdownEl) {
    countdownEl.textContent = `(${secondsLeft}秒後に自動更新)`;
  }
}, 1000);

</script>
</body>
</html>
